name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/fs-helper/go.mod
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build fs-helper
        run: |
          mkdir -p apps/backend/bin
          cd apps/backend/fs-helper
          go build -o ../bin/fs-helper .

      - name: Generate Prisma client
        run: cd packages/database && npx prisma generate

      - name: Build backend
        run: |
          cd apps/backend
          pnpm dlx esbuild src/server.ts \
            --bundle \
            --platform=node \
            --target=node18 \
            --format=esm \
            --outfile=dist/server.js \
            --external:@prisma/client \
            --external:@prisma/engines \
            --external:fsevents \
            --log-level=warning

      - name: Build dashboard
        run: pnpm --filter @nasx/dashboard run build

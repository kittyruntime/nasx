version: "3.8"

services:
  nats:
    image: nats:2.10-alpine
    container_name: nats-jetstream-dev
    command:
      - "--js"
      - "--sd=/data"
      - "--http_port=8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    restart: unless-stopped

volumes:
  nats-data:
